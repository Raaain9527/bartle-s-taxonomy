<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #CCC;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 24px 60px;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 2px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .toolbar button {
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #1A1A1A;
      color: #FFF;
      border: 2px solid #1A1A1A;
      font-family: inherit;
    }

    .toolbar button:hover { background: #333; }
    .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }

    .toolbar .hint {
      font-size: 13px;
      color: #888;
    }

    /* ============================================================
       Real OG Card — rendered at native 1200×630, captured by html2canvas
       ============================================================ */
    #ogCard {
      width: 1200px;
      height: 630px;
      background: #FEFEFE;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      /* No transform, no scaling — html2canvas reads this directly */
    }

    /* Red corner triangle */
    .og-accent {
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 0;
      border-left: 80px solid transparent;
      border-top: 80px solid #D63031;
    }

    /* Top-left stamp */
    .og-stamp {
      position: absolute;
      top: 48px;
      left: 64px;
      border: 3px solid #D63031;
      color: #D63031;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.25em;
      padding: 10px 24px;
    }

    /* Main text */
    .og-text {
      position: absolute;
      left: 64px;
      top: 50%;
      transform: translateY(-58%);
      max-width: 640px;
    }

    .og-title {
      font-size: 72px;
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: -0.025em;
      color: #1A1A1A;
    }

    .og-title em {
      font-style: normal;
      color: #D63031;
    }

    .og-sub {
      margin-top: 24px;
      font-size: 24px;
      color: #8C8C8C;
      line-height: 1.5;
    }

    .og-divider {
      width: 40px;
      height: 3px;
      background: #D63031;
      margin-top: 28px;
    }

    /* Xiaohei */
    .og-xiaohei {
      position: absolute;
      right: 48px;
      bottom: 40px;
      width: 320px;
      height: auto;
      opacity: 0.92;
    }

    /* Bottom line */
    .og-footer {
      position: absolute;
      bottom: 40px;
      left: 64px;
      font-size: 16px;
      color: #B0B0B0;
      letter-spacing: 0.03em;
    }

    /* ============================================================
       Preview wrapper — scrollable at full size, no transform trickery
       ============================================================ */
    .preview-scroll {
      width: 100%;
      max-width: 900px;
      overflow-x: auto;
      border: 1px solid #DDD;
      background: #FFF;
    }

    .size-note {
      margin-top: 8px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }

    @media (max-width: 960px) {
      .toolbar { flex-wrap: wrap; }
      .toolbar .hint { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button id="btnCapture">下载 PNG (1200×630)</button>
    <span class="hint">保存到 assets/images/og-image.png</span>
  </div>

  <div class="preview-scroll">
    <div id="ogCard">
      <div class="og-accent"></div>
      <div class="og-stamp">小黑诊断中心</div>

      <div class="og-text">
        <h1 class="og-title">
          你是什么<br><em>游戏人格？</em>
        </h1>
        <p class="og-sub">24 题 · 3 分钟 · 12 种诊断结果<br>不正经，但很准。不准也不退钱。</p>
        <div class="og-divider"></div>
      </div>

      <img class="og-xiaohei" src="assets/images/xiaohei_ip_ref.png.jpeg" alt="小黑">

      <p class="og-footer">Character IP based on Ian Xiaohei by @helloianneo</p>
    </div>
  </div>

  <p class="size-note">实际尺寸 1200 × 630 px · 适配微信 / QQ / Twitter / Discord 链接预览 · 横向滚动查看完整卡片</p>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
  </script>
  <script>
  (function () {
    'use strict';

    var btn = document.getElementById('btnCapture');
    var card = document.getElementById('ogCard');

    btn.addEventListener('click', function () {
      if (typeof html2canvas === 'undefined') {
        alert('html2canvas 还在加载，请稍后再试。');
        return;
      }

      btn.textContent = '生成中…';
      btn.disabled = true;

      html2canvas(card, {
        width: 1200,
        height: 630,
        scale: 1,
        useCORS: true,
        backgroundColor: '#FEFEFE',
        onclone: function (clonedDoc) {
          // Remove any scroll-related artifacts
          var el = clonedDoc.getElementById('ogCard');
          if (el) {
            el.style.transform = 'none';
          }
        }
      }).then(function (canvas) {
        canvas.toBlob(function (blob) {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'og-image.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          btn.textContent = '下载 PNG (1200×630)';
          btn.disabled = false;
        }, 'image/png');
      }).catch(function (err) {
        alert('生成失败：' + err.message);
        btn.textContent = '下载 PNG (1200×630)';
        btn.disabled = false;
      });
    });
  })();
  </script>
</body>
</html>
