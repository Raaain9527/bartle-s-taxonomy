<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诊断报告 — 游戏人格测试</title>
  <meta name="description" content="24题，3分钟，测出你的12种游戏人格之一。SBTI式荒诞诊断，不正经，但很准。">
  <meta property="og:title" content="测了，看看你是什么游戏人格">
  <meta property="og:description" content="24题，3分钟，测出你的12种游戏人格之一。SBTI式荒诞诊断，不正经，但很准。">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ============================================================
       Result Page — Medical Record Report
       ============================================================ */

    .result__header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .result__label-row {
      display: flex;
      align-items: baseline;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .result__emoji {
      font-size: var(--text-xl);
    }

    .result__type {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 900;
      line-height: 1.1;
    }

    /* --- Severity --- */
    .result__severity {
      margin: var(--space-xl) 0;
    }

    .result__severity-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: var(--text-sm);
      margin-bottom: var(--space-sm);
    }

    .result__severity-pct {
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--color-accent);
    }

    .result__severity-tip {
      font-size: var(--text-xs);
      margin-top: var(--space-xs);
    }

    /* --- One-liner --- */
    .result__oneliner {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      line-height: 1.5;
      margin: var(--space-lg) 0;
    }

    /* --- Diagnosis --- */
    .result__diagnosis {
      margin: var(--space-xl) 0;
    }

    .result__diagnosis-label {
      margin-bottom: var(--space-sm);
    }

    /* --- Quote --- */
    .result__quote {
      font-family: var(--font-hand);
      font-size: var(--text-lg);
      color: var(--color-accent);
      margin: var(--space-xl) 0;
      padding-left: var(--space-lg);
      border-left: 2px solid var(--color-accent);
      letter-spacing: 0.03em;
    }

    /* --- Games --- */
    .result__games {
      margin: var(--space-lg) 0;
    }

    .result__games .annotation {
      margin-bottom: var(--space-xs);
    }

    /* --- Nemesis --- */
    .result__nemesis {
      margin: var(--space-xl) 0;
      padding: var(--space-lg);
      border: 1px dashed var(--color-accent);
    }

    .result__nemesis .annotation {
      margin-bottom: var(--space-xs);
    }

    .result__nemesis p {
      margin-top: var(--space-xs);
    }

    /* --- Character illustration --- */
    .result__illo {
      display: block;
      width: 100%;
      max-width: 480px;
      height: auto;
      margin: var(--space-xl) auto;
    }

    .result__dual-illo {
      display: block;
      width: 100%;
      max-width: 240px;
      height: auto;
      margin: 0 auto var(--space-md);
    }

    /* --- Actions --- */
    .result__actions {
      margin-top: var(--space-2xl);
      text-align: center;
      padding-bottom: var(--space-2xl);
    }

    /* --- Dual Personality --- */
    .result__dual-title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 900;
      text-align: center;
      color: var(--color-accent);
      margin-bottom: var(--space-lg);
    }

    .result__dual-cards {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: var(--space-md);
      align-items: start;
      margin: var(--space-xl) 0;
    }

    .result__dual-card {
      text-align: center;
      padding: var(--space-lg);
      border: 1px solid var(--color-border);
    }

    .result__dual-vs {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 900;
      color: var(--color-accent);
      align-self: center;
      padding: 0 var(--space-xs);
    }

    .result__dual-emoji {
      font-size: var(--text-2xl);
      margin: var(--space-sm) 0;
    }

    .result__dual-type {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .result__dual-cards {
        grid-template-columns: 1fr;
      }
      .result__dual-vs {
        padding: var(--space-md) 0;
      }
      .result__label-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="切换暗色模式">🌙</button>

  <!-- Result Page -->
  <main class="page" id="page-result">
    <div class="container" id="resultRoot">
      <!-- Populated by result.js -->
    </div>
  </main>

  <footer class="site-footer">
    Character IP based on Ian Xiaohei by <a href="https://github.com/helloianneo" target="_blank" rel="noopener">@helloianneo</a>
  </footer>

  <script src="js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="js/share.js"></script>
  <script src="js/result.js"></script>
</body>
</html>
